# Run everything:  docker-compose up --build

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: '0000'
      MYSQL_DATABASE: hospital_db
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p0000"]
      interval: 10s
      retries: 10
      start_period: 20s
    networks: [ hospital-net ]

  mongo:
    image: mongo:7
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      retries: 10
    networks: [ hospital-net ]

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/hospital_db?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: '0000'
      SPRING_DATA_MONGODB_URI: mongodb://mongo:27017/hospital_db
    depends_on:
      mysql: { condition: service_healthy }
      mongo: { condition: service_healthy }
    networks: [ hospital-net ]

volumes:
  mysql-data:
  mongo-data:

networks:
  hospital-net:
    driver: bridge
